name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: build (nix build + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # `nix build` compiles the package and runs the in-crate unit tests
      # (cargoTestFlags = ["--lib"]) inside the sandbox.
      - name: Build package + unit tests
        run: nix build --print-build-logs .#packages.x86_64-linux.default

  test:
    name: test (clippy, fmt, integration, NixOS VM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # install-nix-action enables KVM by default, giving the NixOS VM
      # end-to-end test hardware-accelerated virtualization.
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # Runs clippy (deny warnings), rustfmt --check, and the NixOS VM
      # end-to-end test (push -> signed nix copy -> gc), all as flake checks.
      - name: Flake checks (clippy + fmt + NixOS VM e2e)
        run: nix flake check --print-build-logs

      # The Azurite integration test needs the emulator on PATH, which the
      # devShell provides; it is not part of `nix build` (--lib only).
      - name: Integration tests (Azurite)
        run: nix develop --command cargo test --test azure_azurite
